name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Java ${{ matrix.java-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "25"]
    continue-on-error: ${{ matrix.java-version == '25' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B package -DskipTests
